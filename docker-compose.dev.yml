# Dev-only services. Apps run on the host (HMR); this provides Postgres.
# fchat-sim also runs on the host (`pnpm --filter @emberchat/fchat-sim start`);
# the containerized sim exists only as the prod compose file's smoke profile.
#
# Credentials below are local-dev fixtures, never used in production.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: emberchat
      POSTGRES_PASSWORD: emberchat
      POSTGRES_DB: emberchat
    ports:
      - "5432:5432"
    volumes:
      # postgres:18 images moved the volume mount up to /var/lib/postgresql
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emberchat"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
