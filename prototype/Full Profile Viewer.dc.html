<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#141210;font-family:'IBM Plex Sans',system-ui,sans-serif}
.pv *{box-sizing:border-box}
.pvscroll::-webkit-scrollbar{width:8px;height:8px}
.pvscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:8px}
.pvscroll::-webkit-scrollbar-track{background:transparent}
.pvcap{font:400 12.5px 'IBM Plex Mono',monospace;color:#726a5f;margin:0 0 12px;max-width:520px;line-height:1.5}
.pvcap b{color:#a892c6;font-weight:600}
@keyframes pvshimmer{0%{background-position:-240px 0}100%{background-position:340px 0}}
.pvskel{background:linear-gradient(90deg,#2a2725 0%,#332f2b 40%,#2a2725 80%);background-size:340px 100%;animation:pvshimmer 1.15s linear infinite;border-radius:5px}
</style>
</helmet>
<div class="pv" style="display:flex;flex-wrap:wrap;align-items:flex-start;gap:56px;padding:60px">
  <sc-for list="{{ frames }}" as="f" hint-placeholder-count="12">
  <div style="display:flex;flex-direction:column">
    <div class="pvcap"><b>{{ f.id }}</b> · {{ f.cap }}</div>
    <div>{{ f.el }}</div>
  </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  mix(a,b,t){const p=h=>[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));const A=p(a),B=p(b);
    return '#'+A.map((v,i)=>Math.round(v*(1-t)+B[i]*t).toString(16).padStart(2,'0')).join('');}
  T(){
    const bg='#1b1917',side='#232120',side2='#2a2725',head='#201e1c',text='#ece7e0',dim='#a89e92',
      faint='#726a5f',border='#332f2b',accent='#a892c6',ok='#8bb173',warn='#d0a24f',danger='#e08a6a',radius=9;
    return {bg,side,side2,head,text,dim,faint,border,accent,ok,warn,danger,radius,
      accentSoft:this.mix(accent,bg,.84),accentMed:this.mix(accent,bg,.5),
      mono:`'IBM Plex Mono',ui-monospace,monospace`,ui:`'IBM Plex Sans',system-ui,sans-serif`};
  }
  h(tag,style,...kids){return React.createElement(tag,{style},...kids);}
  hk(key,tag,style,...kids){return React.createElement(tag,{key,style},...kids);}
  attr(props,...kids){return React.createElement(props.tag||'div',props,...kids);}

  // ===================== five-tier match primitive (shared with Mini Profile Viewer) =====================
  tiers(){
    const t=this.T();
    return {
      match:       {frac:1,   label:'Match',        color:t.ok},
      weakMatch:   {frac:.75, label:'Weak match',   color:this.mix(t.ok,t.warn,.55)},
      neutral:     {frac:.5,  label:'Neutral',      color:this.mix(t.dim,t.faint,.4)},
      weakMismatch:{frac:.25, label:'Weak mismatch',color:t.warn},
      mismatch:    {frac:0,   label:'Mismatch',     color:t.danger},
    };
  }
  pie(key,size,color){
    const T=this.tiers()[key];const c=color||T.color;const r=size/2,cx=r,cy=r,sw=1.4,rr=r-sw/2;
    const frac=T.frac;let fill=null;
    if(frac>=1){fill=React.createElement('circle',{cx,cy,r:rr,fill:c,stroke:'none'});}
    else if(frac>0){
      const a=frac*2*Math.PI-Math.PI/2;const x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);
      const large=frac>0.5?1:0;
      const d=`M ${cx} ${cy} L ${cx} ${cy-rr} A ${rr} ${rr} 0 ${large} 1 ${x} ${y} Z`;
      fill=React.createElement('path',{d,fill:c,stroke:'none'});
    }
    return React.createElement('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`,
      style:{display:'inline-block',flexShrink:0,verticalAlign:'middle'}},fill,
      React.createElement('circle',{cx,cy,r:rr,fill:'none',stroke:c,strokeWidth:sw}));
  }
  matchPill(key,opts){
    const t=this.T(),T=this.tiers()[key];const short=opts&&opts.short;
    return this.h('span',{display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 11px 4px 9px',
      borderRadius:'20px',fontFamily:t.ui,fontSize:'11.5px',fontWeight:600,whiteSpace:'nowrap',
      color:T.color,background:this.mix(T.color,t.bg,.83),border:`1px solid ${this.mix(T.color,t.bg,.58)}`},
      this.pie(key,11),short?T.label.replace(' match','').replace(' mismatch',''):T.label);
  }
  dimChip(dim,key){
    const t=this.T(),T=this.tiers()[key];
    return this.h('span',{display:'inline-flex',alignItems:'center',gap:'6px',padding:'3px 8px',borderRadius:'5px',
      fontFamily:t.ui,fontSize:'11px',fontWeight:500,whiteSpace:'nowrap',color:t.dim,
      background:this.mix(T.color,t.side,.86),border:`1px solid ${this.mix(T.color,t.side,.6)}`},dim,this.pie(key,10));
  }
  gl(txt,mb){const t=this.T();return this.h('div',{fontSize:'9.5px',fontWeight:700,letterSpacing:'.1em',
    textTransform:'uppercase',color:t.faint,margin:`0 0 ${mb==null?8:mb}px`},txt);}
  avatar(size,color,initial,radius){
    const t=this.T();
    return this.h('div',{width:size+'px',height:size+'px',borderRadius:(radius==null?t.radius:radius)+'px',flexShrink:0,
      background:`linear-gradient(150deg,${this.mix(color,t.text,.15)},${color})`,display:'flex',alignItems:'center',
      justifyContent:'center',fontFamily:t.mono,fontWeight:600,fontSize:(size*0.4)+'px',color:t.bg,
      boxShadow:'inset 0 1px 0 rgba(255,255,255,.14)'},initial);
  }
  badge(glyph,color){
    const t=this.T();
    return this.h('span',{width:'22px',height:'22px',borderRadius:'6px',flexShrink:0,display:'inline-flex',
      alignItems:'center',justifyContent:'center',fontSize:'12px',color:color,
      background:this.mix(color,t.bg,.84),border:`1px solid ${this.mix(color,t.bg,.62)}`},glyph);
  }
  iconBtn(glyph,opts){
    opts=opts||{};const t=this.T();
    return this.h('span',{width:'30px',height:'30px',borderRadius:t.radius+'px',display:'inline-flex',
      alignItems:'center',justifyContent:'center',fontFamily:t.mono,fontSize:'14px',flexShrink:0,cursor:'pointer',
      color:opts.disabled?this.mix(t.faint,t.side,.35):t.dim,background:t.bg,border:`1px solid ${t.border}`,
      opacity:opts.disabled?.6:1},glyph);
  }
  data(){
    const t=this.T();
    // viewer's own active identity + the character being viewed
    const you={name:'Sable Renn',initial:'S',color:'#5f7a86'};
    const them={name:'Vesna Marlowe',gender:'female',accent:'#c294b0',avatarColor:'#7a5c86',initial:'V',
      isFriend:true,isBookmarked:false,fetched:'12m ago'};
    return {you,them};
  }

  // ===================== modal chrome =====================
  histRow(d,active){
    const t=this.T();
    return this.h('div',{display:'flex',alignItems:'center',gap:'9px',padding:'6px 8px',borderRadius:t.radius+'px',
      cursor:'pointer',background:active?t.accentSoft:'transparent',
      boxShadow:active?`inset 2px 0 0 ${t.accent}`:'none'},
      this.avatar(28,d.color,d.initial,6),
      this.h('div',{minWidth:0,flex:1},
        this.h('div',{fontSize:'12.5px',fontWeight:active?600:500,color:active?t.text:t.dim,overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap'},d.name),
        this.h('div',{fontFamily:t.mono,fontSize:'10px',color:t.faint,marginTop:'1px'},d.ago)),
      this.h('span',{fontFamily:t.mono,fontSize:'12px',color:t.faint,opacity:active?1:.5,padding:'0 2px'},'×'));
  }
  rail(empty){
    const t=this.T();
    const hist=[
      {name:'Vesna Marlowe',initial:'V',color:'#7a5c86',ago:'now'},
      {name:'Kolvarr',initial:'K',color:'#4f6d7a',ago:'8m ago'},
      {name:'Thistle Ardent',initial:'T',color:'#6d7a4f',ago:'1h ago'},
      {name:'Marisol Vane',initial:'M',color:'#86685f',ago:'yesterday'},
      {name:'Orin Fell',initial:'O',color:'#5f6486',ago:'2d ago'},
    ];
    let body;
    if(empty){
      body=this.h('div',{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        textAlign:'center',padding:'0 22px',gap:'10px'},
        this.h('div',{width:'40px',height:'40px',borderRadius:t.radius+'px',border:`1px dashed ${t.border}`,
          display:'flex',alignItems:'center',justifyContent:'center',fontFamily:t.mono,fontSize:'16px',color:t.faint},'◷'),
        this.h('div',{fontSize:'12px',color:t.faint,lineHeight:1.5},'Profiles you view will appear here.'));
    }else{
      body=this.h('div',{flex:1,overflow:'auto',padding:'2px 8px 8px',display:'flex',flexDirection:'column',gap:'1px'},
        ...hist.map((d,i)=>this.hk(i,'div',{},this.histRow(d,i===0))));
      body.props.className='pvscroll';
    }
    return this.h('div',{width:'208px',flexShrink:0,background:t.side2,borderRight:`1px solid ${t.border}`,
      display:'flex',flexDirection:'column'},
      this.h('div',{padding:'15px 16px 9px',borderBottom:`1px solid ${t.border}`},
        this.gl('Recently viewed',0)),
      body);
  }
  noteBlock(mode){
    const t=this.T();
    if(mode==='none'){
      return this.h('div',{display:'inline-flex',alignItems:'center',gap:'6px',padding:'6px 11px',borderRadius:t.radius+'px',
        border:`1px dashed ${t.border}`,cursor:'pointer',fontSize:'11.5px',fontWeight:500,color:t.faint,background:'transparent'},
        this.h('span',{fontFamily:t.mono,fontSize:'12px'},'+'),'Add private note');
    }
    if(mode==='edit'){
      return this.h('div',{width:'240px',background:t.bg,border:`1px solid ${t.accentMed}`,borderRadius:t.radius+'px',
        boxShadow:`0 0 0 3px ${t.accentSoft}`,padding:'9px 10px'},
        this.h('div',{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'},
          this.gl('Private note',0),
          this.h('span',{fontFamily:t.mono,fontSize:'9.5px',color:t.ok},'Saved ✓')),
        this.h('div',{fontSize:'12px',color:t.text,lineHeight:1.5,minHeight:'44px'},
          'Met in Cabin Fever. We RP’d the storm-shelter thread — owes me a reply.',
          this.h('span',{display:'inline-block',width:'1.5px',height:'13px',background:t.accent,marginLeft:'1px',
            verticalAlign:'-2px'})),
        this.h('div',{fontFamily:t.mono,fontSize:'9.5px',color:t.faint,marginTop:'6px'},'autosaves · only you can see this'));
    }
    // peek (note exists, collapsed)
    return this.h('div',{width:'232px',background:t.bg,border:`1px solid ${t.border}`,borderRadius:t.radius+'px',
      padding:'8px 10px',cursor:'pointer'},
      this.h('div',{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'3px'},
        this.h('span',{display:'inline-flex',alignItems:'center',gap:'5px',fontSize:'9.5px',fontWeight:700,
          letterSpacing:'.1em',textTransform:'uppercase',color:t.accent},
          this.h('span',{width:'5px',height:'5px',borderRadius:'50%',background:t.accent}),'Private note'),
        this.h('span',{fontFamily:t.mono,fontSize:'11px',color:t.faint},'✎')),
      this.h('div',{fontSize:'11.5px',color:t.dim,lineHeight:1.45,overflow:'hidden',textOverflow:'ellipsis',
        whiteSpace:'nowrap'},'Met in Cabin Fever — owes me a reply.'));
  }
  header(cfg){
    const t=this.T(),{them}=this.data();
    const badges=[];
    if(them.isFriend)badges.push(this.hk('f','span',{},this.badge('★',t.warn)));
    badges.push(this.hk('b','span',{},this.badge('⚑',cfg.bookmarked?t.accent:t.faint)));
    const budget=cfg.budget;
    const showTip=cfg.tooltip;
    const meta=this.h('div',{display:'flex',alignItems:'center',gap:'10px',marginTop:'7px'},
      this.h('span',{fontFamily:t.mono,fontSize:'11px',color:t.faint},budget?'cached · fetched 1h ago':'fetched 12m ago'),
      budget
        ? this.h('span',{position:'relative',display:'inline-flex'},
            this.iconBtn('⟳',{disabled:true}),
            showTip?this.h('span',{position:'absolute',left:'50%',top:'calc(100% + 7px)',transform:'translateX(-50%)',
              whiteSpace:'nowrap',background:t.head,border:`1px solid ${t.border}`,borderRadius:'6px',padding:'5px 9px',
              fontSize:'10.5px',color:t.dim,boxShadow:'0 8px 24px -6px rgba(0,0,0,.7)',zIndex:5},
              'Hourly profile budget exhausted — refresh available in 48m'):null)
        : this.iconBtn('⟳'),
      this.h('div',{flex:1}),
      cfg.note==='peek'?this.noteBlock('peek'):(cfg.note==='none'?this.noteBlock('none'):null));
    return this.h('div',{padding:'16px 22px 0',background:`linear-gradient(180deg,${this.mix(them.accent,t.side,.9)},${t.side})`},
      this.h('div',{display:'flex',gap:'15px',alignItems:'flex-start'},
        this.avatar(56,them.avatarColor,them.initial),
        this.h('div',{flex:1,minWidth:0},
          this.h('div',{display:'flex',alignItems:'center',gap:'10px'},
            this.h('div',{fontSize:'20px',fontWeight:700,color:them.accent,lineHeight:1.2},them.name),
            this.h('div',{display:'flex',gap:'6px'},...badges)),
          meta)));
  }
  tabStrip(active){
    const t=this.T();
    const tabs=['Overview','Details','Kinks','Compare','Insights','Images','Guestbook'];
    return this.h('div',{display:'flex',gap:'2px',padding:'0 22px',background:this.mix(t.side,t.bg,.35),
      borderBottom:`1px solid ${t.border}`},
      ...tabs.map((tab,i)=>{const on=tab===active;
        return this.hk(i,'div',{padding:'11px 13px 10px',fontSize:'12.5px',fontWeight:on?600:500,cursor:'pointer',
          color:on?t.text:t.dim,boxShadow:on?`inset 0 -2px 0 ${t.accent}`:'none'},tab);}));
  }
  modal(cfg){
    const t=this.T();
    const content=this.h('div',{flex:1,overflow:'auto',minHeight:0},cfg.body);
    content.props.className='pvscroll';
    return this.h('div',{width:'900px',height:'640px',background:t.side,border:`1px solid ${t.border}`,
      borderRadius:'14px',boxShadow:'0 40px 100px -20px rgba(0,0,0,.7)',overflow:'hidden',display:'flex',
      fontFamily:t.ui,color:t.text},
      this.rail(cfg.railEmpty),
      this.h('div',{flex:1,minWidth:0,display:'flex',flexDirection:'column'},
        this.header(cfg),
        cfg.banner?cfg.banner:null,
        this.tabStrip(cfg.tab),
        content));
  }
  banner(kind){
    const t=this.T();
    const c=kind==='budget'?t.warn:t.dim;
    return this.h('div',{display:'flex',alignItems:'center',gap:'9px',padding:'8px 22px',
      background:this.mix(c,t.side,.86),borderBottom:`1px solid ${this.mix(c,t.side,.62)}`,
      fontSize:'11.5px',color:this.mix(c,t.text,.35)},
      this.h('span',{fontFamily:t.mono,fontSize:'12px',color:c},'⚠'),
      kind==='budget'
        ?'Hourly profile budget exhausted. Showing the cached copy from 1h ago — refresh available in 48m.'
        :'Served from cache. This copy may be out of date.');
  }

  // ===================== BBCode native rendering =====================
  bbHeading(txt){const t=this.T();return this.h('div',{fontSize:'15px',fontWeight:700,color:t.text,
    margin:'20px 0 9px',display:'flex',alignItems:'center',gap:'9px'},
    this.h('span',{width:'3px',height:'15px',borderRadius:'2px',background:t.accent,flexShrink:0}),txt);}
  bbQuote(txt,who){const t=this.T();return this.h('div',{margin:'12px 0',padding:'9px 13px',background:t.bg,
    borderLeft:`2px solid ${t.accentMed}`,borderRadius:'0 6px 6px 0'},
    this.h('div',{fontSize:'12.5px',fontStyle:'italic',color:t.dim,lineHeight:1.55},txt),
    who?this.h('div',{fontFamily:t.mono,fontSize:'10px',color:t.faint,marginTop:'5px'},'— '+who):null);}
  bbCollapse(title,open,body){
    const t=this.T();
    return this.h('div',{margin:'12px 0',border:`1px solid ${t.border}`,borderRadius:t.radius+'px',overflow:'hidden'},
      this.h('div',{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',background:t.side2,cursor:'pointer',
        fontSize:'12px',fontWeight:600,color:t.text},
        this.h('span',{fontFamily:t.mono,fontSize:'10px',color:t.accent,transform:open?'rotate(90deg)':'none',
          transition:'transform .15s'},'▶'),title,
        this.h('div',{flex:1}),
        this.h('span',{fontFamily:t.mono,fontSize:'9.5px',color:t.faint,textTransform:'uppercase',letterSpacing:'.08em'},'collapse')),
      open?this.h('div',{padding:'11px 13px',fontSize:'12.5px',color:t.dim,lineHeight:1.6,borderTop:`1px solid ${t.border}`},body):null);
  }
  eicon(label){const t=this.T();return this.h('span',{display:'inline-flex',alignItems:'center',justifyContent:'center',
    width:'60px',height:'60px',borderRadius:'6px',background:this.mix(t.accent,t.bg,.8),border:`1px solid ${t.border}`,
    fontFamily:t.mono,fontSize:'9px',color:t.faint,verticalAlign:'middle',margin:'0 4px'},label);}
  bbBody(){
    const t=this.T();
    const p=(txt,style)=>this.h('div',Object.assign({fontSize:'13px',lineHeight:1.65,color:t.text,margin:'0 0 10px'},style||{}),txt);
    return this.h('div',{},
      this.h('div',{display:'flex',alignItems:'center',gap:'14px',margin:'0 0 14px'},
        this.eicon('arcticfox'),
        this.h('div',{fontSize:'22px',fontWeight:700,color:t.text,lineHeight:1.2},'Vesna, the wandering cartographer')),
      p('A silver-furred arctic fox with ink-stained paws and a coat two sizes too warm for anywhere she actually travels. Curious to a fault; keeps a journal she never lets anyone read.'),
      this.bbQuote('“Every map is out of date the moment you draw it. That’s the fun part.”','her, most mornings'),
      this.bbHeading('Personality'),
      p('Warm but guarded. Slow to trust, fiercely loyal once she does. Reads the room before she reads the map.'),
      this.bbCollapse('Backstory (long — click to expand)',true,
        'Raised in a coastal survey town, apprenticed to a mapmaker who vanished on an expedition north. She took his unfinished atlas and has been filling in the blank quarters ever since — partly to find him, mostly because she can’t stand a blank space on a page.'),
      this.bbCollapse('RP hooks & limits',false,''),
      this.h('div',{fontFamily:t.mono,fontSize:'10.5px',color:t.faint,marginTop:'6px'},
        'Unknown BBCode tags degrade to plain text — the viewer never shows raw ',
        this.h('span',{color:t.dim},'[tags]'),'.'));
  }

  // ===================== TAB: Overview =====================
  matchStrip(){
    const t=this.T();
    return this.h('div',{margin:'0 0 4px',padding:'12px 14px',background:t.bg,border:`1px solid ${t.border}`,
      borderRadius:t.radius+'px'},
      this.h('div',{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'},
        this.gl('Compatibility with Sable Renn',0),
        this.h('div',{flex:1}),
        this.h('span',{fontSize:'11px',fontWeight:600,color:t.accent,cursor:'pointer'},'Full compare →')),
      this.h('div',{display:'flex',flexWrap:'wrap',alignItems:'center',gap:'7px'},
        this.matchPill('weakMatch'),
        this.dimChip('Kinks','match'),
        this.dimChip('Species','match'),
        this.dimChip('Dom/sub','weakMismatch'),
        this.dimChip('Age','neutral')));
  }
  tabOverview(){
    const t=this.T();
    return this.h('div',{padding:'16px 22px 26px'},
      this.matchStrip(),
      this.h('div',{height:'1px',background:t.border,margin:'18px 0 4px'}),
      this.bbBody());
  }

  // ===================== TAB: Insights (§2 tab 5 — your own relationship stats, nothing fetched) =====================
  insightRow(l,v,accent,last){
    const t=this.T();
    return this.h('div',{display:'grid',gridTemplateColumns:'168px 1fr',gap:'12px',padding:'7px 0',
      borderBottom:last?'none':`1px solid ${this.mix(t.border,t.side,.45)}`},
      this.h('div',{fontSize:'12px',color:t.faint},l),
      this.h('div',{fontSize:'12.5px',color:accent?t.accent:t.text,fontWeight:accent?600:500},v));
  }
  tabInsights(empty){
    const t=this.T();
    if(empty){
      return this.h('div',{padding:'64px 22px',display:'flex',flexDirection:'column',alignItems:'center',
        textAlign:'center',gap:'11px'},
        this.h('div',{width:'46px',height:'46px',borderRadius:t.radius+'px',border:`1px dashed ${t.border}`,
          display:'flex',alignItems:'center',justifyContent:'center',fontFamily:t.mono,fontSize:'18px',color:t.faint},'⇄'),
        this.h('div',{fontSize:'13px',fontWeight:600,color:t.dim},'You haven’t crossed paths yet'),
        this.h('div',{fontSize:'12px',color:t.faint,maxWidth:'280px',lineHeight:1.5},
          'Once you share a channel or exchange messages with Vesna, your history together will show up here.'));
    }
    const groups=[
      {g:'Conversation',rows:[['Messages exchanged','1,284',true],['First encountered','Mar 3, 2026 · #Cabin Fever'],
        ['Last chatted','2 days ago'],['Last seen talking','yesterday · #Northreach RP']]},
      {g:'Right now',rows:[['Currently','Online — in 2 shared channels',true],
        ['Shared channels','#Cabin Fever, #Northreach RP']]},
      {g:'This profile',rows:[['Times you’ve viewed','7'],['First viewed','5 weeks ago'],['Bookmarked','No'],['Friend','Yes — since Apr 2026']]},
    ];
    return this.h('div',{padding:'16px 22px 26px'},
      this.h('div',{display:'flex',alignItems:'center',gap:'8px',padding:'0 0 14px'},
        this.h('span',{display:'inline-flex',alignItems:'center',gap:'6px',fontSize:'9.5px',fontWeight:700,
          letterSpacing:'.09em',textTransform:'uppercase',color:t.accent},
          this.h('span',{width:'5px',height:'5px',borderRadius:'50%',background:t.accent}),'You × Vesna'),
        this.h('span',{fontSize:'11.5px',color:t.faint},'— from your local history, never fetched from F-List')),
      this.h('div',{columnCount:2,columnGap:'34px'},
        ...groups.map((grp,gi)=>this.hk(gi,'div',{breakInside:'avoid',marginBottom:'20px'},
          this.gl(grp.g,10),
          ...grp.rows.map((r,i)=>this.hk(i,'div',{},this.insightRow(r[0],r[1],r[2],i===grp.rows.length-1)))))));
  }

      {id:'P·C',cap:'Kinks tab — four columns Fave/Yes/Maybe/No. Each row is tinted + glyph-marked by YOUR own choice for that kink (colorblind-safe: ♥/+/~/× glyph, not colour alone). Custom kinks expand to a description + nested subkinks.',el:this.modal({tab:'Kinks',bookmarked:false,note:'peek',body:this.tabKinks()})},
      {id:'P·D',cap:'Compare tab (§3) — your active character vs. theirs. Six-row dimension table (both values + tier chip + hover reason, row tinted by tier) over the kink-alignment list, sorted worst-conflicts-first in its own scroll region.',el:this.modal({tab:'Compare',bookmarked:false,note:'peek',body:this.tabCompare(false)})},
      {id:'P·E',cap:'Compare — “Conflicts only” filter chip active: the kink list collapses to just the mis/weak-mismatch rows for a fast “what do we need to talk about” read.',el:this.modal({tab:'Compare',bookmarked:false,note:'peek',body:this.tabCompare(true)})},
      {id:'P·E²',cap:'Insights tab (§2 tab 5) — YOUR own relationship stats with this character, computed from local client history (never fetched from F-List). Details-tab label/value language, but an accent “You × Vesna” framing cue signals it’s about the pair: messages exchanged, first/last encounters, live online + shared channels, view count.',el:this.modal({tab:'Insights',bookmarked:false,note:'peek',body:this.tabInsights(false)})},
      {id:'P·E³',cap:'Insights — empty state (“You haven’t crossed paths yet”) for a character you’ve viewed but never shared a channel with or messaged.',el:this.modal({tab:'Insights',bookmarked:false,note:'none',body:this.tabInsights(true)})},
      {id:'P·F',cap:'Images tab — thumbnail grid opening a centred lightbox (prev / next / close), dimmed backdrop over the modal, not a new window.',el:this.modal({tab:'Images',bookmarked:true,note:'peek',body:this.tabImages(true)})},
      {id:'P·G',cap:'Guestbook tab — comment list (author avatar/name/date/BBCode body) with an inline compose box. Ships native even if it later becomes an API link-out.',el:this.modal({tab:'Guestbook',bookmarked:false,note:'peek',body:this.tabGuestbook(false)})},
      {id:'P·H',cap:'Loading — avatar + chrome paint instantly; header meta, infotags and body shimmer in. Rail history is already local, so it stays live.',el:this.modal({tab:'Overview',bookmarked:false,note:'none',body:this.loadingBody()})},
      {id:'P·I',cap:'Stale / budget-exhausted — warn-tinted banner under the header explains the cached copy; the refresh button is disabled. Content is the last cached copy.',el:this.modal({tab:'Overview',bookmarked:false,note:'none',budget:true,banner:this.banner('budget'),body:this.tabOverview()})},
      {id:'P·I′',cap:'Disabled-refresh tooltip — the hover affordance on the budget-exhausted refresh button, shown here on its own (no banner) so the layered states read clearly.',el:this.modal({tab:'Overview',bookmarked:false,note:'peek',budget:true,tooltip:true,body:this.tabOverview()})},
      {id:'P·J',cap:'Profile not found — renamed or deleted upstream. Plain-language reason, Retry, and a website fallback; the history rail is untouched.',el:this.modal({tab:'Overview',bookmarked:false,note:'none',body:this.notFoundBody()})},
      {id:'P·K',cap:'History rail — empty state. The rail is the app’s only view-history surface, so it owns its own empty message.',el:this.modal({tab:'Overview',railEmpty:true,bookmarked:false,note:'none',body:this.notFoundBody()})},
      {id:'P·L',cap:'Guestbook — empty state, and the private-note + reusable-chip detail specs.',el:this.h('div',{display:'flex',gap:'20px',alignItems:'flex-start'},this.noteFrame(),this.linkFrame())},
    ];
    return {frames};
  }
}
</script>
</body>
</html>
