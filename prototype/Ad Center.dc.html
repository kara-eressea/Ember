<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#141210;font-family:'IBM Plex Sans',system-ui,sans-serif}
.ac *{box-sizing:border-box}
.acscroll::-webkit-scrollbar{width:8px}
.acscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:8px}
.acscroll::-webkit-scrollbar-track{background:transparent}
.accap{font:400 12.5px 'IBM Plex Mono',monospace;color:#726a5f;margin:0 0 12px;max-width:520px;line-height:1.5}
.accap b{color:#a892c6;font-weight:600}
@keyframes accaret{50%{opacity:0}}
.accaret{display:inline-block;width:2px;height:1.05em;background:#a892c6;vertical-align:-2px;margin-left:1px;animation:accaret 1.1s step-end infinite}
</style>
</helmet>
<div class="ac" style="display:flex;flex-wrap:wrap;align-items:flex-start;gap:56px;padding:60px">
  <sc-for list="{{ frames }}" as="f" hint-placeholder-count="6">
  <div style="display:flex;flex-direction:column">
    <div class="accap"><b>{{ f.id }}</b> · {{ f.cap }}</div>
    <div>{{ f.el }}</div>
  </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  mix(a,b,t){const p=h=>[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));const A=p(a),B=p(b);
    return '#'+A.map((v,i)=>Math.round(v*(1-t)+B[i]*t).toString(16).padStart(2,'0')).join('');}
  T(){
    const bg='#1b1917',side='#232120',side2='#2a2725',head='#201e1c',text='#ece7e0',dim='#a89e92',
      faint='#726a5f',border='#332f2b',accent='#a892c6',ok='#8bb173',warn='#d0a24f',danger='#e08a6a',radius=9;
    return {bg,side,side2,head,text,dim,faint,border,accent,ok,warn,danger,radius,
      codebg:this.mix(text,bg,.9),accentSoft:this.mix(accent,bg,.84),accentMed:this.mix(accent,bg,.5),
      mono:`'IBM Plex Mono',ui-monospace,monospace`,ui:`'IBM Plex Sans',system-ui,sans-serif`};
  }
  h(tag,style,...kids){return React.createElement(tag,{style},...kids);}
  hk(key,tag,style,...kids){return React.createElement(tag,{key,style},...kids);}
  gl(txt,mb){const t=this.T();return this.h('div',{fontSize:'9.5px',fontWeight:700,letterSpacing:'.1em',
    textTransform:'uppercase',color:t.faint,margin:`0 0 ${mb==null?8:mb}px`},txt);}

  // ---------- small parts ----------
  tagChip(txt,opts){opts=opts||{};const t=this.T();
    return this.h('span',{display:'inline-flex',alignItems:'center',gap:'5px',padding:opts.removable?'2px 5px 2px 8px':'2px 8px',
      borderRadius:'5px',fontFamily:t.ui,fontSize:'11px',fontWeight:500,whiteSpace:'nowrap',
      color:opts.muted?t.faint:t.dim,background:t.bg,border:`1px solid ${t.border}`},
      txt,opts.removable?this.h('span',{fontFamily:t.mono,fontSize:'11px',color:t.faint,cursor:'pointer',opacity:.7},'✕'):null);}
  toggle(on){const t=this.T();return this.h('span',{width:'34px',height:'20px',borderRadius:'20px',flexShrink:0,
    background:on?t.accent:this.mix(t.text,t.bg,.82),position:'relative',display:'inline-block',cursor:'pointer'},
    this.h('span',{position:'absolute',top:'3px',left:on?'17px':'3px',width:'14px',height:'14px',borderRadius:'50%',background:on?t.bg:t.dim}));}
  iconBtn(glyph,opts){opts=opts||{};const t=this.T();
    return this.h('span',{width:'26px',height:'26px',borderRadius:'6px',display:'inline-flex',alignItems:'center',
      justifyContent:'center',fontFamily:t.mono,fontSize:'12px',flexShrink:0,cursor:'pointer',
      color:opts.danger?t.danger:t.faint,background:'transparent',border:`1px solid transparent`},glyph);}
  btn(txt,kind){const t=this.T();const primary=kind==='primary';
    return this.h('span',{display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 16px',height:'34px',
      borderRadius:t.radius+'px',fontSize:'12.5px',fontWeight:primary?700:600,cursor:'pointer',
      color:primary?t.bg:t.text,background:primary?t.accent:t.bg,border:primary?'none':`1px solid ${t.border}`},txt);}

  // ---------- markdown → wire preview (unsupported block md renders literal, reinforcing lossiness) ----------
  inlineMd(str,keyed){
    const t=this.T();const out=[];let i=0,k=0;
    const re=/(\*\*[^*]+\*\*)|(\*[^*]+\*)|(`[^`]+`)|(@[A-Za-z0-9_]+)|(https?:\/\/[^\s]+)/g;
    let m,last=0;
    while((m=re.exec(str))){
      if(m.index>last)out.push(str.slice(last,m.index));
      const tok=m[0];
      if(tok.startsWith('**'))out.push(this.hk('k'+(k++),'strong',{fontWeight:700,color:t.text},tok.slice(2,-2)));
      else if(tok.startsWith('*'))out.push(this.hk('k'+(k++),'em',{fontStyle:'italic'},tok.slice(1,-1)));
      else if(tok.startsWith('`'))out.push(this.hk('k'+(k++),'code',{fontFamily:t.mono,fontSize:'12px',background:t.codebg,borderRadius:'3px',padding:'1px 4px'},tok.slice(1,-1)));
      else if(tok.startsWith('@'))out.push(this.hk('k'+(k++),'span',{color:t.accent,background:t.accentSoft,borderRadius:'3px',padding:'0 3px',fontWeight:600},tok));
      else out.push(this.hk('k'+(k++),'span',{color:t.accent,textDecoration:'underline',textUnderlineOffset:'2px'},tok));
      last=re.lastIndex;
    }
    if(last<str.length)out.push(str.slice(last));
    return out;
  }
  preview(md){
    const t=this.T();
    const lines=md.split('\n');
    return lines.map((ln,i)=>{
      const literal=/^(#{1,6}\s|[-*]\s|>\s|```|\d+\.\s)/.test(ln);
      return this.hk(i,'div',{fontSize:'13px',lineHeight:1.5,color:literal?t.dim:t.text,
        margin:ln.trim()===''?'6px 0':'0',whiteSpace:'pre-wrap'},
        ...(ln.trim()===''?[' ']:this.inlineMd(ln)));
    });
  }

  // ---------- length counter ----------
  counter(bytes,max){
    const t=this.T();const frac=bytes/max;
    let color=t.faint,bar=t.accentMed;
    if(frac>=1){color=t.danger;bar=t.danger;}
    else if(frac>=.98){color=t.danger;bar=t.danger;}
    else if(frac>=.9){color=t.warn;bar=t.warn;}
    const atcap=bytes>=max;
    return this.h('div',{display:'flex',alignItems:'center',gap:'8px'},
      this.h('div',{width:'54px',height:'4px',borderRadius:'3px',background:t.bg,overflow:'hidden',flexShrink:0},
        this.h('div',{width:Math.min(100,frac*100)+'%',height:'100%',background:bar,borderRadius:'3px'})),
      this.h('span',{fontFamily:t.mono,fontSize:'10.5px',fontWeight:atcap?600:400,color},
        bytes.toLocaleString()+' / '+max.toLocaleString()),
      atcap?this.h('span',{fontFamily:t.mono,fontSize:'9px',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',
        color:t.danger,background:this.mix(t.danger,t.bg,.85),border:`1px solid ${this.mix(t.danger,t.bg,.6)}`,
        borderRadius:'4px',padding:'1px 5px'},'at limit'):null);
  }

  // ---------- lossiness warnings ----------
  warnKinds(){
    return {
      blockMd:{label:'Block formatting posts as text',copy:'Headings, lists and quotes aren’t part of the chat dialect — this line reaches the channel verbatim.'},
      fence:{label:'Code fence posts literally',copy:'Triple-backtick fences aren’t supported; the ``` marks and their contents post as plain text.'},
      underscore:{label:'Underscore emphasis ignored',copy:'_underscore_ emphasis isn’t supported — use *asterisks*. Posts with the underscores intact.'},
      unterminated:{label:'Unclosed ** emphasis',copy:'This ** is never closed, so the rest of the ad posts as literal asterisks.'},
      bbcode:{label:'[center] not supported',copy:'That BBCode tag has no chat equivalent and will post as text, brackets and all.'},
      badParam:{label:'[color] is missing a value',copy:'Tags that take a parameter (e.g. [color=red]) post as text when the value is absent.'},
    };
  }
  warnStrip(items,extra){
    const t=this.T();const K=this.warnKinds();
    const row=(it,i)=>{
      const w=K[it.kind];
      return this.hk(i,'div',{display:'flex',gap:'9px',padding:'8px 11px',
        borderTop:i?`1px solid ${this.mix(t.warn,t.side,.78)}`:'none'},
        this.h('span',{fontFamily:t.mono,fontSize:'12px',color:t.warn,marginTop:'1px',flexShrink:0},'⚠'),
        this.h('div',{minWidth:0,flex:1},
          this.h('div',{fontSize:'12px',fontWeight:600,color:t.text},w.label),
          this.h('div',{fontSize:'11.5px',color:t.dim,lineHeight:1.45,marginTop:'2px'},w.copy),
          it.snippet?this.h('div',{fontFamily:t.mono,fontSize:'11px',color:t.faint,background:t.bg,border:`1px solid ${t.border}`,
            borderRadius:'5px',padding:'3px 7px',marginTop:'5px',display:'inline-block',maxWidth:'100%',overflow:'hidden',
            textOverflow:'ellipsis',whiteSpace:'nowrap'},it.snippet):null),
        this.h('span',{fontFamily:t.mono,fontSize:'10px',color:t.faint,flexShrink:0,marginTop:'2px'},'@'+it.at));
    };
    return this.h('div',{flexShrink:0,background:this.mix(t.warn,t.side,.9),border:`1px solid ${this.mix(t.warn,t.side,.62)}`,
      borderRadius:t.radius+'px',overflow:'hidden'},
      this.h('div',{display:'flex',alignItems:'center',gap:'8px',padding:'7px 11px',background:this.mix(t.warn,t.side,.84),
        borderBottom:`1px solid ${this.mix(t.warn,t.side,.62)}`},
        this.h('span',{fontFamily:t.mono,fontSize:'9.5px',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:t.warn},
          items.length+extra+' will post as plain text'),
        this.h('span',{flex:1}),
        this.h('span',{fontSize:'10.5px',color:t.faint},'advisory · won’t block saving')),
      ...items.map(row),
      extra?this.h('div',{padding:'6px 11px',fontSize:'11.5px',fontWeight:600,color:t.warn,cursor:'pointer',
        borderTop:`1px solid ${this.mix(t.warn,t.side,.78)}`},'+'+extra+' more…'):null);
  }

  // ---------- library list ----------
  adRow(ad,active){
    const t=this.T();
    return this.h('div',{display:'flex',gap:'9px',alignItems:'flex-start',padding:'9px 10px',margin:'1px 6px',
      borderRadius:t.radius+'px',cursor:'pointer',opacity:ad.disabled?.6:1,
      background:active?t.accentSoft:'transparent',boxShadow:active?`inset 2px 0 0 ${t.accent}`:'none'},
      this.h('span',{fontFamily:t.mono,fontSize:'12px',color:t.faint,cursor:'grab',marginTop:'1px',lineHeight:1.1,letterSpacing:'-1px'},'∷'),
      this.h('div',{minWidth:0,flex:1},
        this.h('div',{display:'flex',alignItems:'center',gap:'7px'},
          this.h('div',{fontSize:'12.5px',fontWeight:active?600:500,color:ad.disabled?t.faint:t.text,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,minWidth:0},ad.title),
          ad.disabled?this.h('span',{fontFamily:t.mono,fontSize:'8.5px',fontWeight:700,letterSpacing:'.06em',
            textTransform:'uppercase',color:t.faint,border:`1px solid ${t.border}`,borderRadius:'4px',padding:'0 5px',flexShrink:0},'off'):null),
        this.h('div',{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'6px'},
          ...ad.tags.map((tg,i)=>this.hk(i,'span',{},this.tagChip(tg,{muted:ad.disabled}))))),
      this.h('div',{display:'flex',alignItems:'center',gap:'2px',flexShrink:0,marginTop:'-1px'},
        this.iconBtn('✕',{danger:true})));
  }
  libraryCol(sel){
    const t=this.T();
    const ads=this.data().ads;
    return this.h('div',{width:'278px',flexShrink:0,background:t.side2,borderRight:`1px solid ${t.border}`,
      display:'flex',flexDirection:'column'},
      this.h('div',{padding:'15px 16px 12px',borderBottom:`1px solid ${t.border}`},
        this.h('div',{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'},
          this.h('div',{fontSize:'15px',fontWeight:700,color:t.text},'Ad Center'),
          this.h('span',{fontFamily:t.mono,fontSize:'10.5px',color:t.faint},ads.length+' / 50')),
        this.h('div',{fontFamily:t.mono,fontSize:'10.5px',color:t.faint,marginTop:'3px'},'as Vesna Marlowe')),
      this.h('div',{className:'acscroll',flex:1,overflowY:'auto',padding:'6px 0',minHeight:0},
        ...ads.map((a,i)=>this.hk(i,'div',{},this.adRow(a,i===sel)))),
      this.h('div',{padding:'10px 12px',borderTop:`1px solid ${t.border}`},
        this.h('div',{display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',height:'36px',
          borderRadius:t.radius+'px',border:`1px dashed ${t.accentMed}`,color:t.accent,fontSize:'12.5px',fontWeight:600,cursor:'pointer'},
          this.h('span',{fontFamily:t.mono,fontSize:'14px'},'+'),'New ad')));
  }

  // ---------- editor pane ----------
  editorPane(opts){
    opts=opts||{};const t=this.T();const d=this.data();
    const ad=d.ads[opts.sel==null?0:opts.sel];
    const bytes=opts.bytes==null?new Blob([ad.content]).size*1:opts.bytes;
    const max=50000;
    const tagInput=this.h('div',{display:'flex',flexWrap:'wrap',alignItems:'center',gap:'6px',padding:'8px 10px',
      background:t.bg,border:`1px solid ${t.border}`,borderRadius:t.radius+'px'},
      ...ad.tags.map((tg,i)=>this.hk(i,'span',{},this.tagChip(tg,{removable:true}))),
      this.h('span',{fontSize:'12px',color:t.faint},'add tag…'),
      this.h('span',{className:'accaret'}));
    const body=this.h('div',{className:'acscroll',flex:1,overflowY:'auto',padding:'16px 20px 20px',minHeight:0,
      display:'flex',flexDirection:'column',gap:'13px'},
      // editor textarea
      this.h('div',{flexShrink:0,background:t.bg,border:`1px solid ${opts.focus?t.accentMed:t.border}`,borderRadius:t.radius+'px',
        overflow:'hidden',boxShadow:opts.focus?`0 0 0 3px ${t.accentSoft}`:'none'},
        this.h('div',{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 12px',
          background:t.side2,borderBottom:`1px solid ${t.border}`},
          this.gl('Markdown',0),
          this.counter(bytes,max)),
        this.h('div',{padding:'11px 13px',fontFamily:t.mono,fontSize:'12.5px',lineHeight:1.55,color:t.text,
          minHeight:'96px',whiteSpace:'pre-wrap'},ad.content,opts.focus?this.h('span',{className:'accaret'}):null)),
      // lossiness
      opts.warnings?this.warnStrip(opts.warnings,opts.warnExtra||0):null,
      // preview
      this.h('div',{flexShrink:0,background:t.side,border:`1px solid ${t.border}`,borderRadius:t.radius+'px',overflow:'hidden'},
        this.h('div',{padding:'7px 12px',background:t.side2,borderBottom:`1px solid ${t.border}`,fontFamily:t.mono,
          fontSize:'9.5px',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:t.faint,
          display:'flex',alignItems:'center',gap:'8px'},'Preview · as posted',
          this.h('span',{flex:1}),
          this.h('span',{fontWeight:400,letterSpacing:0,textTransform:'none',color:this.mix(t.faint,t.side,.2)},'what the channel sees')),
        this.h('div',{padding:'12px 14px'},...this.preview(ad.content))),
      // tags
      this.h('div',{flexShrink:0},
        this.h('div',{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:'7px'},
          this.gl('Tags',0),
          this.h('span',{fontSize:'11px',color:t.faint},'local only · the post flow picks ads by tag')),
        tagInput,
        this.h('div',{fontSize:'11px',color:t.faint,marginTop:'6px'},'Max 10 tags, 30 chars each. An ad with no tags is filed under ',
          this.h('span',{style:{fontFamily:t.mono,color:t.dim}},'default'),'.')));
    return this.h('div',{flex:1,display:'flex',flexDirection:'column',minWidth:0},
      // head
      this.h('div',{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',
        borderBottom:`1px solid ${t.border}`,gap:'12px'},
        this.h('div',{fontSize:'15px',fontWeight:700,color:t.text},'Edit ad'),
        this.h('label',{display:'flex',alignItems:'center',gap:'9px',cursor:'pointer'},
          this.h('div',{textAlign:'right'},
            this.h('div',{fontSize:'12.5px',fontWeight:600,color:t.text},'Disabled'),
            this.h('div',{fontSize:'11px',color:t.faint},'kept, skipped when posting')),
          this.toggle(!!ad.disabled))),
      opts.conflict?this.conflictBanner():null,
      body,
      // footer
      this.h('div',{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 20px',
        borderTop:`1px solid ${t.border}`,background:t.side2},
        this.h('span',{fontSize:'11.5px',color:t.faint},opts.dirty?'Unsaved changes':'Saved'),
        this.h('div',{display:'flex',gap:'9px'},this.btn('Cancel'),this.btn('Save ad','primary'))));
  }
  conflictBanner(){
    const t=this.T();
    return this.h('div',{display:'flex',gap:'11px',alignItems:'flex-start',padding:'12px 16px',
      background:this.mix(t.danger,t.side,.86),borderBottom:`1px solid ${this.mix(t.danger,t.side,.6)}`},
      this.h('span',{fontFamily:t.mono,fontSize:'13px',color:t.danger,marginTop:'1px'},'↻'),
      this.h('div',{minWidth:0,flex:1},
        this.h('div',{fontSize:'12.5px',fontWeight:600,color:t.text},'Ads changed on another device'),
        this.h('div',{fontSize:'11.5px',color:t.dim,lineHeight:1.45,marginTop:'2px'},
          'Your library was edited elsewhere while this ad was open. Reload to review the current version — your unsaved text is preserved below so you can copy anything you need.')),
      this.h('span',{display:'inline-flex',alignItems:'center',padding:'0 14px',height:'30px',borderRadius:t.radius+'px',
        fontSize:'12px',fontWeight:700,color:t.bg,background:t.danger,cursor:'pointer',flexShrink:0},'Reload'));
  }

  // ---------- modal shell ----------
  modal(w,h_,inner){
    const t=this.T();
    return this.h('div',{width:w+'px',height:h_+'px',background:t.side,border:`1px solid ${t.border}`,
      borderRadius:t.radius+5+'px',boxShadow:'0 40px 100px -20px rgba(0,0,0,.7)',display:'flex',overflow:'hidden',
      fontFamily:t.ui,color:t.text},inner);
  }

  // ---------- frames ----------
  frameMain(){
    return this.modal(880,588,this.h('div',{display:'flex',width:'100%'},
      this.libraryCol(0),
      this.editorPane({sel:0,bytes:1840,focus:true,dirty:true,
        warnings:[{kind:'underscore',at:'L3',snippet:'looking for something _soft_ and slow'}]})));
  }
  frameEmpty(){
    const t=this.T();
    const emptyList=this.h('div',{width:'278px',flexShrink:0,background:t.side2,borderRight:`1px solid ${t.border}`,
      display:'flex',flexDirection:'column'},
      this.h('div',{padding:'15px 16px 12px',borderBottom:`1px solid ${t.border}`},
        this.h('div',{display:'flex',alignItems:'center',justifyContent:'space-between'},
          this.h('div',{fontSize:'15px',fontWeight:700,color:t.text},'Ad Center'),
          this.h('span',{fontFamily:t.mono,fontSize:'10.5px',color:t.faint},'0 / 50')),
        this.h('div',{fontFamily:t.mono,fontSize:'10.5px',color:t.faint,marginTop:'3px'},'as Vesna Marlowe')),
      this.h('div',{flex:1}),
      this.h('div',{padding:'10px 12px',borderTop:`1px solid ${t.border}`},
        this.h('div',{display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',height:'36px',
          borderRadius:t.radius+'px',border:`1px dashed ${t.accentMed}`,color:t.accent,fontSize:'12.5px',fontWeight:600},
          this.h('span',{fontFamily:t.mono,fontSize:'14px'},'+'),'New ad')));
    const pane=this.h('div',{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      textAlign:'center',gap:'12px',padding:'40px'},
      this.h('div',{width:'56px',height:'56px',borderRadius:t.radius+'px',border:`1px dashed ${t.border}`,
        display:'flex',alignItems:'center',justifyContent:'center',fontFamily:t.mono,fontSize:'22px',color:t.faint},'✎'),
      this.h('div',{fontSize:'16px',fontWeight:700,color:t.text},'Write an ad once, post it anywhere'),
      this.h('div',{fontSize:'12.5px',color:t.faint,lineHeight:1.55,maxWidth:'320px'},
        'Your roleplay ads live here. Compose in the composer’s Markdown, tag them however you like, then post selected ads to selected channels — no auto-posting.'),
      this.h('div',{marginTop:'6px'},this.btn('Write your first ad','primary')));
    return this.modal(880,588,this.h('div',{display:'flex',width:'100%'},emptyList,pane));
  }
  frameCounters(){
    const t=this.T();
    const card=(label,el)=>this.h('div',{background:t.side,border:`1px solid ${t.border}`,borderRadius:t.radius+'px',overflow:'hidden',width:'320px'},
      this.h('div',{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:t.side2,borderBottom:`1px solid ${t.border}`},
        this.h('span',{fontFamily:t.mono,fontSize:'9.5px',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:t.faint},label),el));
    return this.h('div',{display:'flex',flexDirection:'column',gap:'14px',width:'340px'},
      card('normal',this.counter(1840,50000)),
      card('90% → amber',this.counter(45200,50000)),
      card('98% → red',this.counter(49300,50000)),
      card('at limit — typing blocked',this.counter(50000,50000)),
      this.h('div',{fontSize:'11.5px',color:t.faint,lineHeight:1.55,padding:'2px 2px 0'},
        'Counter measures the translated BBCode wire bytes — not the Markdown source — against the runtime ',this.h('span',{style:{fontFamily:t.mono,color:t.dim}},'lfrp_max'),
        ' (default 50,000). Amber ≥ 90%, red ≥ 98%. At the cap the field stops accepting input — overflow is impossible, not truncated on save.'));
  }
  frameWarnings(){
    return this.modal(880,588,this.h('div',{display:'flex',width:'100%'},
      this.libraryCol(1),
      this.editorPane({sel:1,bytes:3120,focus:false,dirty:true,
        warnings:[
          {kind:'blockMd',at:'L1',snippet:'## Looking for a scene partner'},

      line(this.clusterBtn('▤','Ad',false),'Idle state, faint like its siblings. The existing per-message Ad toggle (M6) is unchanged and separate — that flags one composed line as an LRP ad; this opens the library.'));
    return this.h('div',{width:'520px',display:'flex',flexDirection:'column',gap:'14px'},bar,card);
