name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  ci:
    name: build-test-lint
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm --filter @emberchat/web exec playwright install --with-deps chromium
      - run: pnpm turbo e2e

  # Boots the production image against a real Postgres and asserts /healthz.
  # Catches whole-image failures the workspace test suite can't see — missing
  # dist copies in the runtime stage, broken migrations-on-boot, bad CMD.
  image-smoke:
    name: image-boot-smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: emberchat
          POSTGRES_PASSWORD: ci-only
          POSTGRES_DB: emberchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emberchat"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v7
      - run: docker build --target runtime -t emberchat-smoke .
      - name: Boot image and probe /healthz
        run: |
          docker run -d --name smoke --network host \
            -e DATABASE_URL=postgres://emberchat:ci-only@localhost:5432/emberchat \
            -e AUTH_SECRET=$(openssl rand -base64 48 | tr -d '\n') \
            emberchat-smoke
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/healthz; then exit 0; fi
            if [ -z "$(docker ps -q -f name=smoke)" ]; then break; fi
            sleep 1
          done
          echo "::error::server image failed to boot"
          docker logs smoke
          exit 1
