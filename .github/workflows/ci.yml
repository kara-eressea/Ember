name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: build-test-lint
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm --filter @emberline/web exec playwright install --with-deps chromium
      - run: pnpm turbo e2e
