# Publishes the production image to ghcr (M7 step 6). Self-hosters pin
# their risk appetite by tag:
#   vX.Y.Z    — exact release (immutable)
#   vX.Y / vX — rolling within a minor / major (compatible by definition:
#               breaking changes are always a major bump + upgrade gate)
#   latest    — newest release
#   edge      — every push to main (pre-release; run at your own pace)
name: Release image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  image:
    name: build-push-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=edge,branch=main
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLIENT_VERSION=${{ github.ref_type == 'tag' && github.ref_name || format('0.0.0-edge.{0}', github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
