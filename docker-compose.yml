# Self-host deployment (decisions.md §2/§5: one instance, one person, on a
# VPS). Copy .env.example to .env, set the two secrets, `docker compose up
# -d` — the full walkthrough lives in docs/self-hosting.md. TLS termination
# is a reverse proxy's job (set TRUST_PROXY and APP_BASE_URL when one is in
# front). Accounts are created with the admin CLI (registration is off):
#
#   docker compose exec server node apps/server/dist/cli/admin.js \
#     create-user --email you@example.com --username you --password-stdin
#
# The `sim` profile adds fchat-sim for smoke testing against a fake F-Chat:
#   docker compose --profile sim up  (with FCHAT_URL/FLIST_API_URL pointed at it)
# Never run the sim profile in a real deployment.

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: emberchat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: emberchat
    volumes:
      # postgres:18 images moved the volume mount up to /var/lib/postgresql
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emberchat"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    # Pin your risk appetite: vX.Y.Z (exact), vX.Y (compatible bugfixes),
    # latest (newest release), edge (every main commit — pre-release).
    # Building from source instead: replace `image:` with
    #   build: { context: ., target: runtime }
    image: ghcr.io/kara-eressea/ember:${IMAGE_TAG:-latest}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://emberchat:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/emberchat
      AUTH_SECRET: ${AUTH_SECRET:?set in .env}
      FCHAT_URL: ${FCHAT_URL:-wss://chat.f-list.net/chat2}
      FLIST_API_URL: ${FLIST_API_URL:-https://www.f-list.net}
      APP_NAME: ${APP_NAME:-EmberChat}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      CLIENT_NAME: ${CLIENT_NAME:-EmberChat}
      # CLIENT_VERSION is baked into the image by the release workflow.
      TRUST_PROXY: ${TRUST_PROXY:-}
      RETENTION_POLICY: ${RETENTION_POLICY:-forever}
      UPDATE_CHECK_ENABLED: ${UPDATE_CHECK_ENABLED:-true}
      CONFIRM_BREAKING_UPGRADE: ${CONFIRM_BREAKING_UPGRADE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # Nightly pg_dump into ./backups, pruning after BACKUP_KEEP_DAYS. No
  # third-party image — the postgres image itself runs the loop. Restore
  # drill: docs/self-hosting.md §Backups.
  backup:
    image: postgres:18-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          ts=$$(date -u +%Y%m%d-%H%M%S)
          pg_dump -h postgres -U emberchat -d emberchat -Fc -f "/backups/emberchat-$$ts.dump" \
            && echo "backup written: emberchat-$$ts.dump" \
            || echo "BACKUP FAILED at $$ts" >&2
          find /backups -name 'emberchat-*.dump' -mtime "+$$BACKUP_KEEP_DAYS" -delete
          sleep "$$BACKUP_INTERVAL_SECONDS"
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Fake F-Chat for smoke tests only (fixture accounts, no persistence).
  sim:
    profiles: ["sim"]
    build:
      context: .
      target: sim
    restart: unless-stopped

volumes:
  pgdata:
